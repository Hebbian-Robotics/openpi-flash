services:
  prepare-checkpoint:
    profiles: ["openpi"]
    build:
      context: ..
      dockerfile: hosting/Dockerfile
    command: ["python", "main.py", "prepare-checkpoint"]
    volumes:
      - inference-cache:/cache

  inference:
    profiles: ["openpi"]
    build:
      context: ..
      dockerfile: hosting/Dockerfile
    depends_on:
      prepare-checkpoint:
        condition: service_completed_successfully
    environment:
      - INFERENCE_CONFIG_PATH=/config/config.json
    volumes:
      - ./config.json:/config/config.json:ro
      - inference-cache:/cache
    ports:
      - "8000:8000"
      - "5555:5555/udp"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  inference-cache:
