services:
  inference:
    profiles: ["openpi"]
    build:
      context: ..
      dockerfile: hosting/Dockerfile
    environment:
      - INFERENCE_CONFIG_PATH=/config/config.json
    volumes:
      - ./config.json:/config/config.json:ro
      - inference-cache:/cache
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /openpi/inference
        awslogs-create-group: "true"

volumes:
  inference-cache:
