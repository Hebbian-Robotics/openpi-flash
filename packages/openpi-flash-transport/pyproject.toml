[project]
name = "openpi-flash-transport"
version = "0.1.0"
description = "Shared local transport protocol helpers for openpi-flash."
requires-python = ">=3.11,<3.13"
dependencies = [
    "numpy>=1.22.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openpi_flash_transport"]

[tool.uv]
# Supply-chain hardening: refuse PyPI releases younger than 7 days.
# See: https://docs.astral.sh/uv/concepts/resolution/#exclude-newer
exclude-newer = "7 days"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "ANN",
    "PTH",
    "RET",
    "SIM",
    "TID",
    "RUF",
]
ignore = ["E501", "B008", "C901", "RET504", "ANN401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
