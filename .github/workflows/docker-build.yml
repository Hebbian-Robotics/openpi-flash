name: Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: openpi-hosted
  ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hosting
        uses: actions/checkout@v6
        with:
          path: hosting

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: hosting/Dockerfile
          config: hosting/.hadolint.yaml

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout hosting
        uses: actions/checkout@v6
        with:
          path: hosting

      - name: Checkout openpi
        uses: actions/checkout@v6
        with:
          repository: Hebbian-Robotics/openpi
          path: openpi

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hosting/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
