[project]
name = "openpi-hosting"
version = "0.1.0"
description = "Hosted inference service for openpi"
requires-python = ">=3.11"
dependencies = [
    "openpi",
    "openpi-client",
    "pydantic>=2.0",
    "modal>=0.73",
    "starlette>=0.37",
]

[tool.uv.sources]
openpi = { path = "../openpi", editable = true }
openpi-client = { path = "../openpi/packages/openpi-client", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.15.9",
    "ty>=0.0.29",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hosting"]

[tool.ruff]
extend = "../openpi/pyproject.toml"

[tool.ty.environment]
# vlash is not installed in the hosting venv — it's added via PYTHONPATH
# in the Docker container. Point ty at it so it can resolve vlash.* imports.
extra-paths = ["../vlash"]
