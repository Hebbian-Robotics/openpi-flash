[project]
name = "openpi-hosting"
version = "0.1.0"
description = "Hosted inference service for openpi"
requires-python = ">=3.11"
dependencies = [
    "openpi",
    "openpi-client",
    "pydantic>=2.0",
]

[tool.uv.sources]
openpi = { path = "../openpi", editable = true }
openpi-client = { path = "../openpi/packages/openpi-client", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff",
    "ty",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hosting"]

[tool.ruff]
extend = "../openpi/pyproject.toml"
